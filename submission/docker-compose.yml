services:
  model:
    # Stock image won the official H200 comparison (63.82 vs 62.97 for
    # warmup1). Keep the immutable digest; do not reintroduce pre-serve warmup.
    image: misokaio/ghfjdk:v0.25.1
    environment:
    - HF_HUB_OFFLINE=1
    - TRANSFORMERS_OFFLINE=1
    - vllm_USE_RUST_FRONTEND=1
    - VLLM_USE_FASTOKENS=1
    - VLLM_CONFIGURE_LOGGING=0
    - OMP_NUM_THREADS=1
    - MKL_NUM_THREADS=1
    # Keep the vLLM default HTTP keep-alive. The 600s override scored 62.16
    # on H200 versus 63.82 for this exact stock configuration.
    entrypoint:
      - python3 #Don't change this to vllm-server
      - -m  #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server #Don't change this to vllm-server
    command:
      - --model=/model
      - --quantization=fp8          # native online bf16->fp8 (H200 coherent, no temp)
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=8192
      - --performance-mode=interactivity
      - --optimization-level=3
      - --gpu-memory-utilization=0.85
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --max-num-batched-tokens=1536
      - --performance-mode=interactivity
      - '--override-generation-config={
          "temperature": 0.0,
          "top_p": 1.0,
          "top_k": 1,
          "min_p": 0.0,
          "presence_penalty": 0.0,
          "repetition_penalty": 1.0,
        }'
      - --max-num-seqs=64
      - --disable
      - --disable-uvicorn-access-log
      - --language-model-only
      - --skip-mm-profiling
      - --no-enable-log-requests
      - --disable-log-stats
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
